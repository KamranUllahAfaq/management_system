<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Royal Group of Hostel</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed-variant": "#005236",
                    "on-primary": "#68001a",
                    "on-error": "#690005",
                    "inverse-on-surface": "#283044",
                    "on-secondary-fixed-variant": "#004395",
                    "tertiary-fixed": "#6ffbbe",
                    "on-primary-fixed-variant": "#920028",
                    "surface-tint": "#ffb3b6",
                    "on-primary-fixed": "#40000c",
                    "error": "#ffb4ab",
                    "outline": "#ac8889",
                    "error-container": "#93000a",
                    "primary-container": "#e11d48",
                    "inverse-primary": "#be0037",
                    "background": "#0b1326",
                    "surface": "#0b1326",
                    "surface-container-high": "#222a3d",
                    "surface-dim": "#0b1326",
                    "on-primary-container": "#fffaf9",
                    "surface-container": "#171f33",
                    "secondary-fixed-dim": "#adc6ff",
                    "on-background": "#dae2fd",
                    "outline-variant": "#5c3f40",
                    "primary-fixed": "#ffdada",
                    "tertiary": "#4edea3",
                    "on-secondary-container": "#e6ecff",
                    "surface-bright": "#31394d",
                    "on-error-container": "#ffdad6",
                    "on-secondary-fixed": "#001a42",
                    "surface-container-lowest": "#060e20",
                    "secondary": "#adc6ff",
                    "secondary-fixed": "#d8e2ff",
                    "secondary-container": "#0566d9",
                    "on-surface": "#dae2fd",
                    "inverse-surface": "#dae2fd",
                    "on-tertiary-container": "#eefff3",
                    "on-secondary": "#002e6a",
                    "surface-container-highest": "#2d3449",
                    "primary": "#ffb3b6",
                    "surface-variant": "#2d3449",
                    "tertiary-fixed-dim": "#4edea3",
                    "on-tertiary-fixed": "#002113",
                    "on-surface-variant": "#e5bdbe",
                    "surface-container-low": "#131b2e",
                    "primary-fixed-dim": "#ffb3b6",
                    "tertiary-container": "#00845a",
                    "on-tertiary": "#003824"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "base": "8px",
                    "container-padding": "24px",
                    "desktop-max": "1440px",
                    "gutter": "16px"
            },
            "fontFamily": {
                    "headline-md": ["Montserrat"],
                    "body-md": ["Inter"],
                    "display-lg": ["Montserrat"],
                    "body-lg": ["Inter"],
                    "display-lg-mobile": ["Montserrat"],
                    "label-sm": ["Inter"]
            },
            "fontSize": {
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "display-lg-mobile": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #0b1326;
            overflow: hidden;
        }
        .glass-panel {
            background: rgba(23, 31, 51, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glow-shadow {
            box-shadow: 0 0 40px rgba(255, 179, 182, 0.15);
        }
        .input-focus-glow:focus {
            box-shadow: 0 0 15px rgba(173, 198, 255, 0.3);
            border-color: #adc6ff;
            outline: none;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center font-body-md text-on-surface">
<!-- Atmospheric Animated Background -->

<!-- Content Container -->
<main class="relative z-10 w-full max-w-[1440px] px-container-padding flex items-center justify-center">
<!-- Login Card -->
<div class="glass-panel glow-shadow w-full max-w-lg rounded-xl p-8 md:p-12 transition-all duration-500 animate-in fade-in slide-in-from-bottom-8">
<!-- Brand Header -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary-container/20 mb-6 border border-primary/30">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="apartment">apartment</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight mb-2">Royal Group of Hostel</h1>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Islamabad Hostel City</p>
</div>
<!-- Context Info -->
<div class="mb-8 p-4 rounded-lg bg-surface-container-highest/30 border border-white/5">
<p class="text-body-md text-on-surface/80 text-center leading-relaxed">
                    Login to view your hostel profile, room details, fee status, dues, transport and complaints.
                </p>
</div>
<!-- Login Form -->
<form class="space-y-6" id="loginForm">
<!-- User ID -->
<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-on-surface-variant ml-1" for="studentId">Student ID / CNIC / Reg No</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-secondary" data-icon="person">person</span>
<input class="w-full bg-surface-container-lowest/50 border border-outline-variant rounded-lg py-3.5 pl-12 pr-4 text-on-surface placeholder:text-on-surface-variant/40 input-focus-glow transition-all duration-300" id="studentId" name="studentId" placeholder="Enter your registration number" required="" type="text"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<a class="text-label-sm font-label-sm text-secondary hover:text-primary transition-colors duration-300" href="#">Forgot password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-secondary" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-lowest/50 border border-outline-variant rounded-lg py-3.5 pl-12 pr-4 text-on-surface placeholder:text-on-surface-variant/40 input-focus-glow transition-all duration-300" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="eyeIcon">visibility</span>
</button>
</div>
</div>
<!-- Remember & Submit -->
<div class="flex items-center justify-between pt-2">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative flex items-center justify-center">
<input class="peer hidden" type="checkbox"/>
<div class="w-5 h-5 rounded border border-outline-variant bg-surface-container peer-checked:bg-primary-container peer-checked:border-primary transition-all duration-300"></div>
<span class="material-symbols-outlined absolute text-on-primary-container text-xs opacity-0 peer-checked:opacity-100 transition-opacity" data-icon="check" style="font-size: 14px; font-weight: 800;">check</span>
</div>
<span class="text-body-md text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
</div>
<button class="w-full bg-primary-container hover:bg-primary text-on-primary-container font-headline-md text-headline-md py-4 rounded-lg shadow-lg shadow-primary/20 active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-3" type="submit">
                    Login 
                    <span class="material-symbols-outlined" data-icon="login">login</span>
</button>
</form>
<!-- Back to Home Action -->
<div class="mt-8 pt-8 border-t border-white/10 flex flex-col items-center">
<a class="group flex items-center gap-2 text-on-surface-variant hover:text-primary transition-all duration-300" href="#">
<span class="material-symbols-outlined transform group-hover:-translate-x-1 transition-transform" data-icon="arrow_back">arrow_back</span>
<span class="font-label-sm text-label-sm">Back to Home</span>
</a>
</div>
</div>
<!-- Decorative Floating Elements -->
<div class="absolute -top-10 -right-10 w-40 h-40 bg-primary/10 rounded-full blur-[80px] pointer-events-none"></div>
<div class="absolute -bottom-10 -left-10 w-40 h-40 bg-secondary/10 rounded-full blur-[80px] pointer-events-none"></div>
</main>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerText = 'visibility';
            }
        }

        // Form feedback simulation
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> Authenticating...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
                // Add success or error feedback here
            }, 1500);
        });
    </script>
</body></html>
